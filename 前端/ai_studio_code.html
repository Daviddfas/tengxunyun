<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聆心小开 - 蒲公英树洞</title>
    <!-- 引入 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            /* 稍微加深的大地暖沙色，让蒲公英更具对比度 */
            --bg-start: #EBE6DF;       
            --bg-end: #F4F1EB;
            --text-main: #5C544B;      
            --text-sub: #9E968D;       
            --accent-color: #B59C82;   
            --accent-hover: #9E856C;   
            --border-color: rgba(220, 215, 208, 0.8);   
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'PingFang SC', -apple-system, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            overflow: hidden;
            color: var(--text-main);
        }

        /* 3D 画布铺满底层 */
        #canvas-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
        }

        /* 右侧 UI 布局 */
        .ui-container {
            position: relative; z-index: 10;
            display: flex; width: 100%; height: 100%;
            align-items: center; justify-content: flex-end; 
            padding-right: 12vw; box-sizing: border-box;
            animation: fadeInUI 1.2s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
            pointer-events: none; /* 让鼠标穿透，触发左侧蒲公英的视差互动 */
        }

        @keyframes fadeInUI {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* 极致通透的毛玻璃卡片 */
        .login-card {
            background-color: rgba(255, 255, 255, 0.55); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.9); 
            border-radius: 24px; 
            width: 380px;
            padding: 45px 45px;
            box-shadow: 0 30px 60px rgba(92, 84, 75, 0.08), inset 0 0 0 1px rgba(255,255,255,0.6);
            transition: all 1s cubic-bezier(0.25, 1, 0.3, 1);
            pointer-events: auto; /* 恢复表单的鼠标响应 */
        }

        /* 吹散时的表单隐退 */
        .login-card.fade-out {
            opacity: 0;
            transform: scale(0.95) translateY(-10px);
            pointer-events: none;
            filter: blur(10px);
        }

        .header { margin-bottom: 30px; }
        
        .title {
            font-size: 28px; font-weight: 600;
            margin: 0 0 10px 0; letter-spacing: 2px; color: #4A423C;
        }

        .subtitle {
            font-size: 14px; color: var(--text-sub); margin: 0;
            line-height: 1.8; letter-spacing: 0.5px;
        }

        /* === 新增：注册/登录双选项切换 === */
        .auth-toggle {
            display: flex; position: relative;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px; margin-bottom: 25px; padding: 5px;
            border: 1px solid rgba(255,255,255,0.8);
        }
        .toggle-btn {
            flex: 1; text-align: center; padding: 12px 0; font-size: 14px; font-weight: 600;
            cursor: pointer; z-index: 2; transition: color 0.3s; color: var(--text-sub);
        }
        .toggle-btn.active { color: var(--text-main); }
        .toggle-slider {
            position: absolute; top: 5px; left: 5px; 
            width: calc(50% - 5px); height: calc(100% - 10px);
            background: #FFFFFF; border-radius: 16px; 
            box-shadow: 0 2px 10px rgba(92, 84, 75, 0.1);
            transition: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 1;
        }
        .auth-toggle.register-mode .toggle-slider {
            transform: translateX(100%);
        }

        /* 表单输入框 */
        .input-group { margin-bottom: 22px; }
        .input-group label {
            display: block; font-size: 13px; font-weight: 600;
            color: var(--text-main); margin-bottom: 10px; letter-spacing: 1px;
        }
        .input-group input {
            width: 100%; padding: 16px 20px;
            background-color: rgba(255, 255, 255, 0.7); 
            border: 1px solid var(--border-color);
            border-radius: 14px; box-sizing: border-box;
            font-size: 14px; color: var(--text-main);
            outline: none; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .input-group input:focus {
            background-color: rgba(255, 255, 255, 1);
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(181, 156, 130, 0.15); 
            transform: translateY(-2px);
        }
        .input-group input::placeholder { color: #C4BEB8; }

        /* 提交按钮 */
        .submit-btn {
            width: 100%; padding: 18px; margin-top: 10px;
            background-color: var(--accent-color); color: white;
            border: none; border-radius: 30px; 
            font-size: 16px; font-weight: 600; letter-spacing: 2px;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 10px 25px rgba(181, 156, 130, 0.25);
        }
        .submit-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(181, 156, 130, 0.4);
        }

        /* 动画结束文案 */
        .welcome-msg {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px; font-weight: 300;
            color: var(--text-main);
            opacity: 0; pointer-events: none;
            transition: opacity 2s cubic-bezier(0.25, 1, 0.3, 1);
            z-index: 5; letter-spacing: 4px; text-align: center; line-height: 1.6;
        }

    </style>
</head>
<body>

    <!-- 3D 蒲公英 画布 -->
    <div id="canvas-container"></div>

    <!-- UI -->
    <div class="ui-container">
        <div class="welcome-msg" id="welcome-msg">深呼吸...<br>烦恼正随风消散</div>

        <div class="login-card" id="login-card">
            <div class="header">
                <h1 class="title">聆心小开</h1>
                <p class="subtitle">像吹散蒲公英一样，<br>把沉重的思绪交给风，只留下一片轻盈。</p>
            </div>

            <!-- 注册/登录 切换器 -->
            <div class="auth-toggle" id="auth-toggle">
                <div class="toggle-slider"></div>
                <div class="toggle-btn active" onclick="switchMode('login')">登录</div>
                <div class="toggle-btn" onclick="switchMode('register')">注册</div>
            </div>

            <form id="login-form">
                <div class="input-group">
                    <label>你的称呼</label>
                    <input type="text" placeholder="例如：旅人 / 星期八" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label>你的密码</label>
                    <input type="password" placeholder="心底的密码" required>
                </div>
                <button type="submit" class="submit-btn" id="submit-btn">登录并吹散</button>
            </form>
        </div>
    </div>

    <script>
        // ==========================================
        // UI 逻辑：登录/注册 模式切换
        // ==========================================
        let isRegisterMode = false;
        function switchMode(mode) {
            const toggleWrap = document.getElementById('auth-toggle');
            const btns = document.querySelectorAll('.toggle-btn');
            const submitBtn = document.getElementById('submit-btn');

            if (mode === 'register' && !isRegisterMode) {
                isRegisterMode = true;
                toggleWrap.classList.add('register-mode');
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
                submitBtn.innerText = '注册并吹散';
            } else if (mode === 'login' && isRegisterMode) {
                isRegisterMode = false;
                toggleWrap.classList.remove('register-mode');
                btns[1].classList.remove('active');
                btns[0].classList.add('active');
                submitBtn.innerText = '登录并吹散';
            }
        }

        // ==========================================
        // 1. Three.js 场景初始化
        // ==========================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2('#F4F1EB', 0.012); 

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 85);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // ==========================================
        // 2. 改进版：超高对比度的毛茸茸蒲公英纹理
        // ==========================================
        const createFluffTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const cx = 64, cy = 64;

            // 柔和但高亮的光晕
            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 64);
            grad.addColorStop(0, 'rgba(255, 255, 255, 1)'); 
            grad.addColorStop(0.3, 'rgba(255, 255, 255, 0.6)');
            grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 128, 128);

            // 绘制深褐色的种子核心 (这是让蒲公英具有真实感且绝不会隐形的关键！)
            ctx.beginPath();
            ctx.arc(cx, cy, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#8C7D6E'; 
            ctx.fill();

            // 绘制放射状的高亮绒毛丝
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.lineWidth = 1.5;
            for (let i = 0; i < 40; i++) {
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                let angle = Math.random() * Math.PI * 2;
                let r = 25 + Math.random() * 35;
                ctx.quadraticCurveTo(
                    cx + Math.cos(angle + 0.3) * r * 0.5,
                    cy + Math.sin(angle + 0.3) * r * 0.5,
                    cx + Math.cos(angle) * r,
                    cy + Math.sin(angle) * r
                );
                ctx.stroke();
            }
            return new THREE.CanvasTexture(canvas);
        };

        // ==========================================
        // 3. 构建高保真双层蒲公英 (中心托盘 + 绒毛连根茎)
        // ==========================================
        const seedsCount = 1200; 
        const dandelionGroup = new THREE.Group();
        
        // 用于动画记录风力与速度
        const velocities =[];

        // A. 绒毛顶点
        const fluffGeo = new THREE.BufferGeometry();
        const fluffPos = new Float32Array(seedsCount * 3);

        // B. 花茎线条 (从中心连接到每颗绒毛)
        const stemGeo = new THREE.BufferGeometry();
        const stemPos = new Float32Array(seedsCount * 6); 

        const radius = 20; // 蒲公英半径扩大，视觉更震撼

        for (let i = 0; i < seedsCount; i++) {
            // 斐波那契球面算法，完美均匀分布
            const phi = Math.acos(1 - 2 * (i + 0.5) / seedsCount);
            const theta = Math.PI * (1 + Math.sqrt(5)) * i;

            // 增加自然凹凸扰动
            const r = radius + (Math.random() * 3 - 1.5); 

            // 绒毛伞的外端坐标
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta);
            const z = r * Math.cos(phi);

            fluffPos[i * 3] = x;
            fluffPos[i * 3 + 1] = y;
            fluffPos[i * 3 + 2] = z;

            // 计算连接茎的内部起点 (预留中心空间作为花托)
            const dir = new THREE.Vector3(x, y, z).normalize();
            const stemLength = r * 0.9; // 稍微小于半径
            const startX = x - dir.x * stemLength;
            const startY = y - dir.y * stemLength;
            const startZ = z - dir.z * stemLength;

            // 茎的起点 (内侧)
            stemPos[i * 6] = startX;
            stemPos[i * 6 + 1] = startY;
            stemPos[i * 6 + 2] = startZ;
            // 茎的终点 (连着外侧绒毛)
            stemPos[i * 6 + 3] = x;
            stemPos[i * 6 + 4] = y;
            stemPos[i * 6 + 5] = z;

            // 预生成被吹散时的风速向量 (偏右上方爆开)
            velocities.push({
                x: dir.x * 0.2 + 0.2 + Math.random() * 0.3,
                y: dir.y * 0.2 + 0.2 + Math.random() * 0.3,
                z: dir.z * 0.2 + (Math.random() - 0.5) * 0.3
            });
        }

        fluffGeo.setAttribute('position', new THREE.BufferAttribute(fluffPos, 3));
        stemGeo.setAttribute('position', new THREE.BufferAttribute(stemPos, 3));

        // 绒毛材质：尺寸调大，确保纹理清晰展现
        const fluffMaterial = new THREE.PointsMaterial({
            size: 9, 
            map: createFluffTexture(),
            transparent: true,
            opacity: 1,
            depthWrite: false,
            blending: THREE.NormalBlending 
        });

        // 茎秆材质：深灰棕色，对比度强，清晰可见
        const stemMaterial = new THREE.LineBasicMaterial({
            color: 0x968A7D,
            transparent: true,
            opacity: 0.45
        });

        const fluffs = new THREE.Points(fluffGeo, fluffMaterial);
        const stems = new THREE.LineSegments(stemGeo, stemMaterial);

        // 中心深色花托 (确保蒲公英结构饱满)
        const coreGeo = new THREE.SphereGeometry(2, 16, 16);
        const coreMat = new THREE.MeshBasicMaterial({ color: 0x7A7065 });
        const coreMesh = new THREE.Mesh(coreGeo, coreMat);

        dandelionGroup.add(fluffs);
        dandelionGroup.add(stems);
        dandelionGroup.add(coreMesh);
        
        // 响应式布局定位：避免小屏幕被遮挡
        dandelionGroup.position.x = window.innerWidth > 900 ? -22 : 0;
        scene.add(dandelionGroup);

        // ==========================================
        // 4. 视差跟随互动 (轻柔平滑)
        // ==========================================
        let targetRotX = 0;
        let targetRotY = 0;
        let isBlowing = false;

        document.addEventListener('mousemove', (event) => {
            if (isBlowing) return;
            let mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            let mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
            targetRotY = mouseX * 0.25; 
            targetRotX = mouseY * 0.25;
        });

        // ==========================================
        // 5. 渲染循环与吹散涡流算法
        // ==========================================
        let animationFrameId;

        function animate() {
            animationFrameId = requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            if (!isBlowing) {
                // 平时状态：缓慢自转 + 鼠标跟随视差
                dandelionGroup.rotation.y += (targetRotY + time * 0.08 - dandelionGroup.rotation.y) * 0.05;
                dandelionGroup.rotation.x += (targetRotX - dandelionGroup.rotation.x) * 0.05;
                // 中心花托呼吸轻微浮动
                coreMesh.scale.setScalar(1 + Math.sin(time * 2) * 0.03);
            } 
            else {
                // 吹散状态：绒毛与茎秆连根拔起，随风飞舞
                const fPos = fluffGeo.attributes.position.array;
                const sPos = stemGeo.attributes.position.array;

                for (let i = 0; i < seedsCount; i++) {
                    let v = velocities[i];
                    
                    // 空气涡流 (Turbulence)：打着旋儿飞走
                    v.x += Math.sin(time * 4 + fPos[i*3+1] * 0.05) * 0.012;
                    v.y += Math.cos(time * 4 + fPos[i*3] * 0.05) * 0.012;

                    // 同步更新绒毛坐标
                    fPos[i*3] += v.x;
                    fPos[i*3+1] += v.y;
                    fPos[i*3+2] += v.z;

                    // 同步更新茎秆起点与终点 (整根飞走)
                    sPos[i*6] += v.x;
                    sPos[i*6+1] += v.y;
                    sPos[i*6+2] += v.z;
                    sPos[i*6+3] += v.x;
                    sPos[i*6+4] += v.y;
                    sPos[i*6+5] += v.z;
                }

                fluffGeo.attributes.position.needsUpdate = true;
                stemGeo.attributes.position.needsUpdate = true;

                // 中心花托淡出
                coreMesh.scale.multiplyScalar(0.95);

                // 材质缓和隐退
                if (fluffMaterial.opacity > 0) {
                    fluffMaterial.opacity -= 0.005;
                    stemMaterial.opacity -= 0.003;
                } else {
                    cancelAnimationFrame(animationFrameId);
                }
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            // 响应式重置蒲公英位置
            if (!isBlowing) dandelionGroup.position.x = window.innerWidth > 900 ? -22 : 0;
        });

        // ==========================================
        // 6. 表单提交与吹散转场
        // ==========================================
        const loginForm = document.getElementById('login-form');
        const loginCard = document.getElementById('login-card');
        const welcomeMsg = document.getElementById('welcome-msg');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();

            // 1. 卡片失去焦点并淡出
            loginCard.classList.add('fade-out');

            // 2. 将旋转矩阵应用为绝对坐标，停止外层旋转，准备解体
            dandelionGroup.updateMatrixWorld();
            fluffGeo.applyMatrix4(dandelionGroup.matrixWorld);
            stemGeo.applyMatrix4(dandelionGroup.matrixWorld);
            dandelionGroup.position.set(0,0,0);
            dandelionGroup.rotation.set(0,0,0);
            
            isBlowing = true;

            // 3. 伴随治愈文案及模拟页面跳转
            setTimeout(() => {
                welcomeMsg.style.opacity = '1';
                setTimeout(() => { location.reload(); }, 3500); // 留足 3.5 秒欣赏飞舞
            }, 500);
        });
    </script>
</body>
</html>
